rules_version: 2
id: safety.gitleaks_config
provenance: agent-readiness/safety.gitleaks_config
pillar: safety
title: Secret-scanning config present
weight: 1.0
severity: warn
explanation: |
  An agent that handles credentials or pushes commits is one
  copy-paste away from leaking a secret into git history. Repos that
  declare a secret-scanning config (gitleaks, trufflehog, .pre-commit
  with detect-secrets, or GitHub's native push protection markers)
  signal that secret scanning is enforced as part of the contributor
  flow, which materially reduces leak risk in agent-driven changes.

  This rule only fires when the repo shows evidence of *handling
  secrets* — env-file usage, env-var reads in source (os.environ /
  process.env / System.getenv / std::env), cloud SDK imports (boto3,
  @aws-sdk/*, google.cloud, azure.identity, …), or compose / IaC
  declarations that bind secrets (docker-compose env_file:, k8s
  Secret kind, terraform aws_secretsmanager_secret, …). A
  pure-library repo with no credential surface area is not penalised
  for omitting a tool it has no use for; see
  ``agent-readiness-research/research/aaif_evidence/2026-05-21_calibration_cycle.md``
  for the FP analysis that motivated this gate.
match:
  type: secret_scanning_config
  accept_paths:
    - .gitleaks.toml
    - .gitleaks.yaml
    - .gitleaks.yml
    - gitleaks.toml
    - .trufflehog.yaml
    - .trufflehog.yml
    - .secrets.baseline
    - .pre-commit-config.yaml
    - .github/workflows/gitleaks.yml
    - .github/workflows/secret-scan.yml
  require_precondition: true
  max_files_scanned: 200
  max_bytes_per_file: 64000
fix_hint: |
  Add a `.gitleaks.toml` (or `.secrets.baseline` for detect-secrets) and
  wire it into pre-commit or a GitHub Actions workflow. Example:
  https://github.com/gitleaks/gitleaks-action.
fix_template:
  kind: create_file
  path: .gitleaks.toml
  content: |
    # Minimal gitleaks config. Wire into pre-commit or run from CI via
    # https://github.com/gitleaks/gitleaks-action so secrets get caught
    # before they hit git history. Customize the allowlist per repo.
    title = "gitleaks config"

    [allowlist]
    description = "Per-repo false-positive allowlist"
    paths = [
      '''(.*?)(\.lock|\.snap)$''',
      '''node_modules/''',
      '''vendor/''',
    ]
insight_query: gitleaks trufflehog detect-secrets secret scanning agent push
action:
  kind: create_file
  path: .gitleaks.toml
  template: |
    # gitleaks configuration: tunes which paths and rules are scanned
    # for secrets in pre-commit hooks and CI.
    title = "gitleaks config"

    [[allowlist.regexes]]
    description = "Allow .env.example placeholder values"
    regex = '''EXAMPLE_VAR\s*='''
  preconditions:
    - not_exists: .gitleaks.toml
verify:
  command: "test -f .gitleaks.toml"
  description: .gitleaks.toml must exist.
fix_prompt: |
  This rule fired because your repo shows evidence of handling
  secrets (env-file usage, env-var reads in source, cloud SDK imports,
  or compose / IaC declarations that bind secrets) but ships no
  secret-scanning config. Without one, an agent one copy-paste away
  from leaking a credential has no automated catch — the leak makes
  it into git history before review.

  Create `.gitleaks.toml` at the repo root with a minimal config: a
  `title` string and one `[allowlist]` block listing your known
  false-positive paths (lockfiles, vendor/, node_modules/). Then wire
  gitleaks into pre-commit (add a `gitleaks` hook to
  `.pre-commit-config.yaml`) AND CI (add `.github/workflows/gitleaks.yml`
  using `gitleaks/gitleaks-action@v2`). Detect-secrets via
  `.secrets.baseline` is an acceptable alternative.

  If your repo genuinely has no credential surface area (a pure
  library, a numerics package, a docs-only repo) the scanner
  suppresses this rule automatically — there's nothing to do.

  Verify with: `test -f .gitleaks.toml`
