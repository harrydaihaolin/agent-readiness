rules_version: 2
id: hooks.configured
provenance: agent-readiness/hooks.configured
pillar: feedback
title: Git or agent hooks configured
weight: 0.7
severity: info
explanation: |
  Agents running an edit/wait/fix loop at CI speed (minutes) bleed
  time on cosmetic feedback that pre-commit hooks would have caught
  in seconds — a repo that runs format + lint on every commit cuts
  that loop by an order of magnitude. Hooks (pre-commit, husky,
  lefthook, lint-staged, .claude/settings, .cursor/settings) are how
  the project gives the agent that feedback *before* a commit lands
  rather than after CI fails.
match:
  type: composite
  op: or
  summary: At least one hook framework is configured.
  clauses:
    - type: path_glob
      require_globs:
        - .pre-commit-config.yaml
        - .pre-commit-config.yml
        - .husky/**
        - lefthook.yml
        - lefthook.yaml
        - .lefthook.yml
        - .lefthook.yaml
        - .claude/settings.json
        - .cursor/settings.json
        - .trunk/**
    - type: regex_in_files
      pattern: '"(husky|simple-git-hooks|lint-staged|lefthook)"\s*:'
      file_globs:
        - package.json
fix_hint: |
  Drop a hook configuration that runs format + lint on every commit.
  The framework doesn't matter — pre-commit, husky+lint-staged,
  lefthook, simple-git-hooks, .claude/settings, .cursor/settings all
  count. The goal is "every commit gets formatted and linted before
  it touches a branch."
fix_template:
  kind: create_file
  path: .pre-commit-config.yaml
  content: |
    # Run `pre-commit install` once after committing this file so the
    # hooks fire on every commit. Tune the language hooks for your stack.
    repos:
      - repo: https://github.com/pre-commit/pre-commit-hooks
        rev: v4.6.0
        hooks:
          - id: trailing-whitespace
          - id: end-of-file-fixer
          - id: check-yaml
          - id: check-merge-conflict
      - repo: https://github.com/astral-sh/ruff-pre-commit
        rev: v0.6.9
        hooks:
          - id: ruff
            args: [--fix]
          - id: ruff-format
insight_query: pre-commit husky lefthook lint-staged git hooks pre-commit-config
action:
  kind: create_file
  path: .pre-commit-config.yaml
  template: |
    repos:
      - repo: https://github.com/pre-commit/pre-commit-hooks
        rev: v4.6.0
        hooks:
          - id: trailing-whitespace
          - id: end-of-file-fixer
          - id: check-yaml
          - id: check-merge-conflict
  preconditions:
    - not_exists: .pre-commit-config.yaml
verify:
  command: "test -f .pre-commit-config.yaml"
  description: .pre-commit-config.yaml must exist.
fix_prompt: |
  Without this, an agent's edit/wait/fix loop runs at CI speed (minutes)
  instead of pre-commit speed (seconds).

  Pick a hook framework appropriate to your stack and check in its
  config. Any of these counts:
  - **pre-commit** (universal, Python-runtime but language-agnostic
    hooks): create `.pre-commit-config.yaml` at the repo root with
    `pre-commit-hooks` (trailing-whitespace, end-of-file-fixer,
    check-yaml, check-merge-conflict) plus your stack's formatter and
    linter. Run `pre-commit install` once after committing.
  - **husky + lint-staged** (Node-native): `npm i -D husky lint-staged`,
    then `npx husky init` to create `.husky/pre-commit`.
  - **lefthook** (single-binary, fast): `lefthook install` after
    dropping `lefthook.yml`.
  - **simple-git-hooks** (zero-dep, JS): add `"simple-git-hooks"` block
    to `package.json`.
  - **agent IDE settings**: `.claude/settings.json` /
    `.cursor/settings.json` for IDE-side automation.

  For the formatter/linter step the hook runs, pick what matches your
  {primary_language} (see lint.configured / hooks docs): ruff for
  Python, eslint+prettier for JS/TS, gofmt+golangci-lint for Go,
  rustfmt+clippy for Rust, rubocop for Ruby, etc.

  Verify with: `test -f .pre-commit-config.yaml || test -d .husky || test -f lefthook.yml || grep -qE '"(husky|lint-staged|simple-git-hooks|lefthook)"\\s*:' package.json 2>/dev/null`
