rules_version: 2
id: manifest.detected
provenance: agent-readiness/manifest.detected
pillar: feedback
title: Project manifest detected
weight: 1.0
severity: warn
explanation: |
  Agents need a manifest (`pyproject.toml`, `package.json`,
  `Cargo.toml`, `go.mod`, …) as the contract telling them what the
  project is, how to install it, and what depends on what — without
  one, every action becomes guesswork from filenames and tribal
  knowledge. This rule looks for a manifest at the repo root or, for
  monorepos, at depth ≤ 2 (`packages/<name>/pyproject.toml`).
match:
  type: manifest_introspection
  mode: any_manifest_present
  monorepo_depth: 2
fix_hint: |
  Drop a `pyproject.toml` (or `package.json` / `Cargo.toml` / etc.)
  at the repo root with at least name + version + dependencies. For
  monorepos, every package directory should have its own manifest.
insight_query: project manifest pyproject package.json Cargo.toml go.mod monorepo
action:
  kind: create_file
  path: pyproject.toml
  template: |
    [project]
    name = "{primary_language}-project"
    version = "0.1.0"
    requires-python = ">=3.11"

    [build-system]
    requires = ["hatchling"]
    build-backend = "hatchling.build"
  preconditions:
    - not_exists: pyproject.toml
    - not_exists: package.json
    - not_exists: go.mod
    - not_exists: Cargo.toml
  context_probe:
    - detect: primary_language
    - detect: primary_manifest
verify:
  command: |
    # Mirrors the engine's _ROOT_MANIFESTS list — any one of these is
    # enough. JVM + niche-language manifests (build.sbt, build.sc,
    # deps.edn, rebar.config, dune-project, Project.toml, DESCRIPTION,
    # Makefile.PL, cpanfile, Pipfile, tsconfig.json) were missing
    # pre-v2.4.0 even though the language probe knew about them, so
    # this verify command lagged the matcher.
    test -f pyproject.toml || test -f package.json || \
      test -f go.mod || test -f Cargo.toml || test -f Gemfile || \
      test -f composer.json || test -f pom.xml || \
      test -f build.gradle || test -f build.gradle.kts || \
      test -f build.sbt || test -f build.sc || \
      test -f Package.swift || test -f mix.exs || \
      test -f pubspec.yaml || \
      test -f project.clj || test -f deps.edn || \
      test -f rebar.config || test -f dune-project || \
      test -f Project.toml || test -f DESCRIPTION || \
      test -f Makefile.PL || test -f cpanfile || \
      test -f Pipfile || test -f tsconfig.json || \
      test -f stack.yaml || test -f cabal.project
  description: |
    A primary manifest must exist (any supported language). Matches
    the engine's recognised-manifest list as of pack v2.4.0.
fix_prompt: |
  Without this, an agent has no contract telling it what the project is,
  how to install it, or what depends on what — every action becomes
  guesswork.

  Create a manifest at the repo root matching your {primary_language}.
  Pick the canonical file for your ecosystem:
  - Python: `pyproject.toml`
  - JS/TS (npm/yarn/pnpm/bun): `package.json`
  - Rust: `Cargo.toml`
  - Go: `go.mod`
  - Ruby: `Gemfile` (+ optional `*.gemspec`)
  - PHP: `composer.json`
  - Java/Kotlin/Scala: `pom.xml`, `build.gradle`, or `build.gradle.kts`
  - Swift: `Package.swift`
  - Elixir: `mix.exs`
  - Dart/Flutter: `pubspec.yaml`
  - Clojure: `project.clj` or `deps.edn`

  Include name, version, and at least one declared dependency. For
  monorepos, drop a manifest in each package directory too (depth ≤ 2).
  If `{primary_manifest}` already exists elsewhere, move it to the
  root or document its location in `AGENTS.md`.

  Verify with: `test -f pyproject.toml || test -f package.json || test -f Cargo.toml || test -f go.mod || test -f Gemfile || test -f composer.json || test -f pom.xml || test -f build.gradle || test -f build.gradle.kts || test -f Package.swift || test -f mix.exs || test -f pubspec.yaml`
