rules_version: 2
id: lint.configured
provenance: agent-readiness/lint.configured
pillar: feedback
title: Linter is configured
weight: 0.9
severity: warn
explanation: |
  A configured linter is the difference between an agent's edit being
  immediately rejected with a clear error and the same edit silently
  drifting from house style. Even if the linter is permissive, having
  *a* config tells agents which rules are intentional and which are
  drift.
match:
  type: composite
  op: or
  summary: At least one linter config is present.
  clauses:
    - type: path_glob
      require_globs:
        # Python
        - ruff.toml
        - .ruff.toml
        - .flake8
        - .pylintrc
        - pylintrc
        # JS/TS
        - .eslintrc
        - .eslintrc.js
        - .eslintrc.cjs
        - .eslintrc.json
        - .eslintrc.yml
        - .eslintrc.yaml
        - eslint.config.js
        - eslint.config.mjs
        - eslint.config.cjs
        - eslint.config.ts
        - biome.json
        - biome.jsonc
        # Go / Rust / C-family
        - .golangci.yml
        - .golangci.yaml
        - .golangci.toml
        - rustfmt.toml
        - .rustfmt.toml
        - clippy.toml
        - .clippy.toml
        - .clang-format
        - .clang-tidy
        # Ruby / PHP / Elixir / Kotlin / Swift / Dart
        - .rubocop.yml
        - .rubocop.yaml
        - .standard.yml
        - phpcs.xml
        - phpcs.xml.dist
        - phpstan.neon
        - phpstan.neon.dist
        - psalm.xml
        - .credo.exs
        - detekt.yml
        - detekt.yaml
        - .swiftlint.yml
        - .swiftlint.yaml
        - analysis_options.yaml
        # CSS / Markdown / YAML helpers
        - .stylelintrc
        - .stylelintrc.json
        - .stylelintrc.js
        - .markdownlint.json
        - .markdownlint.yaml
        - .markdownlint.yml
        - .yamllint
        - .yamllint.yml
        - .yamllint.yaml
    - type: regex_in_files
      pattern: '\[tool\.(ruff|black|pylint|isort)\]'
      file_globs:
        - pyproject.toml
    - type: regex_in_files
      pattern: '\[(flake8|pylint|tool:pytest)\]'
      file_globs:
        - setup.cfg
    - type: regex_in_files
      pattern: '"(eslintConfig|prettier|lint-staged)"\s*:'
      file_globs:
        - package.json
fix_hint: |
  Add a linter config in whatever form your language ecosystem
  prefers. The minimal config is fine — what matters is that the
  rules are explicit so agents inherit them instead of falling back
  to defaults. Common choices: Python → ruff (`[tool.ruff]` in
  pyproject.toml); JS/TS → eslint or biome; Go → golangci-lint
  (`.golangci.yml`); Rust → clippy + rustfmt (`.clippy.toml`,
  `rustfmt.toml`); Ruby → rubocop or standard; PHP → phpcs/phpstan;
  Swift → swiftlint; Kotlin → detekt; Dart → analyzer
  (`analysis_options.yaml`).
insight_query: linter eslint ruff pylint biome stylelint config
action:
  kind: modify_manifest_field
  manifest: pyproject.toml
  field_path: tool.ruff
  value: |
    line-length = 100
    target-version = "py311"
  preconditions:
    - exists: pyproject.toml
    - manifest_language: python
verify:
  command: "grep -lE '(\\[tool\\.(ruff|black|pylint)\\]|eslint|biome|golangci|rubocop|swiftlint|detekt|phpstan|analyzer)' pyproject.toml package.json eslint.config.* .golangci.yml .rubocop.yml .swiftlint.yml detekt.yml phpstan.neon analysis_options.yaml 2>/dev/null"
  description: A lint configuration must exist (any language).
fix_prompt: |
  Without this, an agent's edits silently drift from house style and CI
  reviewers spend cycles on cosmetic feedback instead of logic.

  Add a linter config for your {primary_language} project. The minimal
  config is fine — what matters is that the rules are explicit so
  agents inherit them instead of falling back to defaults.

  Common choices by language:
  - Python: append `[tool.ruff]` to `pyproject.toml` with
    `line-length = 100` and `target-version = "py311"`; install with
    `pip install ruff`. Run `{language_lint_command}` (typically
    `ruff check .`).
  - JS/TS: `npm i -D eslint && npx eslint --init` to generate
    `eslint.config.js`. Or use biome (`biome.json`) for a faster
    single-binary toolchain.
  - Go: `golangci-lint` with `.golangci.yml`; run
    `{language_lint_command}` (typically `go vet ./...`).
  - Rust: clippy + rustfmt (`.clippy.toml`, `rustfmt.toml`). Run
    `{language_lint_command}` (typically `cargo clippy`).
  - Ruby: rubocop (`.rubocop.yml`) or standard.
  - PHP: phpstan (`phpstan.neon`) or phpcs (`phpcs.xml`).
  - Swift: swiftlint (`.swiftlint.yml`).
  - Kotlin: detekt (`detekt.yml`).
  - Dart/Flutter: analyzer (`analysis_options.yaml`).

  Verify with: `grep -lE '(\\[tool\\.(ruff|black|pylint)\\]|eslint|biome|golangci|rubocop|swiftlint|detekt|phpstan|analyzer)' pyproject.toml package.json eslint.config.* .golangci.yml .rubocop.yml .swiftlint.yml detekt.yml phpstan.neon analysis_options.yaml 2>/dev/null`
