rules_version: 2
id: meta.consistency
provenance: agent-readiness/meta.consistency
pillar: cognitive_load
title: README claims match repo contents
weight: 0.5
severity: warn
explanation: |
  Agents that follow the README will hit a missing tool or undefined
  target and either revert or invent a workaround when README
  documentation drifts from what the repo actually has — one of the
  most expensive false starts. Common drifts caught here: README
  mentions pytest but no pytest config exists; README mentions
  `npm test` but no package.json; README references `make X` for a
  target that doesn't exist in the Makefile; README documents
  `npm run X` but the script is missing from package.json; README
  documents `pip install -e .` but no pyproject.toml/setup.py exists;
  AGENTS.md / CLAUDE.md is a placeholder.
match:
  type: cross_file_consistency
  mode: readme_repo_match
  checks:
    - pytest_mention_requires_config
    - npm_test_requires_package_json
    - agent_doc_not_placeholder
    - make_target_referenced_in_readme
    - package_json_script_referenced_in_readme
    - pip_editable_requires_manifest
fix_hint: |
  Every command mentioned in README.md / AGENTS.md / CONTRIBUTING.md
  must be backed by a real target/script/manifest. Examples: a `make X`
  line requires a `X:` target in the Makefile; an `npm run X` line
  requires the script in `package.json`; a `pytest` mention requires
  `[tool.pytest.ini_options]` in `pyproject.toml`; a `cargo test`
  mention requires `Cargo.toml`. Agent docs must be ≥ 100 bytes of
  real content, not a stub.
insight_query: README repo drift consistency placeholder pytest npm AGENTS.md make target npm run pip editable
action:
  kind: run_command
  command: |
    # Audit the README/AGENTS.md/CONTRIBUTING setup commands for
    # consistency. Any drift between them confuses agents.
    grep -E '(make install|pip install|npm install|setup)' \
      README.md AGENTS.md CONTRIBUTING.md 2>/dev/null
  description: |
    Reconcile setup / test commands across README.md, AGENTS.md, and
    CONTRIBUTING.md so all three documents reference the same flow.
verify:
  command: "true"
  description: Manual reconciliation; re-scan is the closed loop.
fix_prompt: |
  Without this, an agent that follows the README will hit a missing tool
  or undefined target and either revert or invent a workaround.

  Reconcile every command mentioned in `README.md`, `AGENTS.md`, and
  `CONTRIBUTING.md` so they all reference the same flow. Each command
  must be backed by a real target/script/manifest:
  - `make X` line → `X:` target in `Makefile`
  - `npm run X` / `yarn X` / `pnpm X` → `X` in `package.json` `scripts`
  - `pytest` mention → `[tool.pytest.ini_options]` in `pyproject.toml`
    or `pytest.ini`
  - `pip install -e .` / `uv pip install -e .` → manifest at root
    (`pyproject.toml` or `setup.py`)
  - `cargo X` → matching subcommand in `Cargo.toml`
  - `go test ./...` → `go.mod` at root
  - `bundle exec X` → matching gem dep in `Gemfile`
  - `mix X` → matching task in `mix.exs`
  - `composer X` → matching script in `composer.json`
  - `gradle X` / `./gradlew X` → matching task in `build.gradle[.kts]`

  Don't let agent-targeted docs ship as stubs (< 100 bytes of real
  content) — agents read AGENTS.md and CLAUDE.md first.

  Verify with: re-run the scan; the rule should no longer flag drift.
