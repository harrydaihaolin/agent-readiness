rules_version: 2
id: ci.configured
provenance: agent-readiness/ci.configured
pillar: feedback
title: CI pipeline configured
weight: 0.9
severity: warn
explanation: |
  CI is how a coding agent confirms that "my change passes" the same
  way a human reviewer would. Without it, the agent ships PRs that
  green-on-laptop, red-in-prod, and the project picks up the cleanup.
  Any modern CI provider counts; the rule is just "*some* automated
  test pipeline is configured." Some teams use hosted CI (BuildKite
  cloud, TeamCity hosted, Jenkins on a remote server) where there's
  no in-repo config to detect — for those repos, document the CI
  with a README badge so the agent knows the loop exists.
match:
  type: composite
  op: or
  summary: At least one CI provider config is present.
  clauses:
    # Hosted-Git native CI (the common case for OSS in 2026)
    - type: path_glob
      require_globs:
        - .github/workflows/*.yml
        - .github/workflows/*.yaml
        - .gitlab-ci.yml
        - .gitea/workflows/*.yml
        - .gitea/workflows/*.yaml
        - .forgejo/workflows/*.yml
        - .forgejo/workflows/*.yaml
        - bitbucket-pipelines.yml
        - .gitea-ci.yml
    # Cloud-hosted CI SaaS
    - type: path_glob
      require_globs:
        - .circleci/config.yml
        - .circleci/config.yaml
        - .travis.yml
        - .travis.yaml
        - azure-pipelines.yml
        - azure-pipelines.yaml
        - .azure-pipelines.yml
        - .azure-pipelines/**
        - .buildkite/**
        - buildkite.yml
        - buildkite.yaml
        - .drone.yml
        - .drone.yaml
        - .woodpecker.yml
        - .woodpecker.yaml
        - .woodpecker/**
        - appveyor.yml
        - .appveyor.yml
        - cloudbuild.yaml
        - cloudbuild.yml
        - .semaphore/**
        - semaphore.yml
        - codefresh.yaml
        - codefresh.yml
        - .codefresh/**
        - .teamcity/**
        - codemagic.yaml
        - codemagic.yml
        - wercker.yml
        - .wercker.yml
        - screwdriver.yaml
        - screwdriver.yml
        - .nevercode.yml
    # Self-hosted / on-prem (long tail)
    - type: path_glob
      require_globs:
        - Jenkinsfile
        - jenkinsfile
        - Jenkinsfile.groovy
        - jenkins/**
        - .jenkins/**
        - tekton/**
        - .tekton/**
        - argo/**
        - .argo/**
        - .argo-ci/**
        - .harness/**
        - .concourse/**
        - concourse/pipeline.yml
        - concourse/pipeline.yaml
    # AWS / GCP / build-tool-driven CI
    - type: path_glob
      require_globs:
        - buildspec.yml          # AWS CodeBuild
        - buildspec.yaml
        - .buildspec.yml
        - .buildspec.yaml
        - dagger.json
        - dagger.cue
        - earthly.yml
        - earthly.yaml
        - Earthfile
        - .prow.yaml
        - .prow.yml
        - garden.yml
        - garden.yaml
        - skaffold.yaml
        - skaffold.yml
fix_hint: |
  Drop a CI workflow that installs deps, runs the test command, and
  reports status to PRs. The default scaffold writes
  `.github/workflows/ci.yml`, but any of the 25+ providers detected
  by this rule counts — pick whatever your hosting platform supports
  natively. Even a 20-line config is worth more than nothing: the
  agent gets red/green feedback per push. If you use a hosted CI
  with no in-repo file (BuildKite cloud, TeamCity hosted, Jenkins on
  a remote server), add a status badge to your README so the loop is
  visible to agents.
fix_template:
  kind: create_file
  path: .github/workflows/ci.yml
  content: |
    name: ci
    on:
      pull_request:
      push:
        branches: [main]

    jobs:
      test:
        runs-on: ubuntu-latest
        steps:
          - uses: actions/checkout@v4
          - name: Install
            run: |
              # Replace with the canonical install command from AGENTS.md.
              echo "TODO: install dependencies"
          - name: Test
            run: |
              # Replace with the canonical test command from AGENTS.md.
              echo "TODO: run tests"
insight_query: continuous integration GitHub Actions GitLab CI CircleCI Jenkins Buildkite Drone Tekton Travis Azure Pipelines CodeBuild Codemagic
action:
  kind: create_file
  path: .github/workflows/ci.yml
  template: |
    name: CI
    on:
      pull_request:
      push:
        branches: [main]
    jobs:
      test:
        runs-on: ubuntu-latest
        steps:
          - uses: actions/checkout@v4
          - run: {language_test_command}
  preconditions:
    - not_exists: .github/workflows/ci.yml
  context_probe:
    - detect: primary_language
verify:
  command: "test -f .github/workflows/ci.yml"
  description: A CI workflow must exist under .github/workflows/.
fix_prompt: |
  Without this, an agent's "tests pass on my laptop" never gets
  challenged by a clean-checkout run and silent regressions ship.

  Pick the CI provider that matches your hosting platform and check
  in its config. The fastest path for most repos in 2026 is
  `.github/workflows/ci.yml` (GitHub Actions) with three steps:
  `actions/checkout@v4`, install dependencies for {primary_language}
  with `{language_install_command}`, then run
  `{language_test_command}`. Trigger on `pull_request` and on `push`
  to `main`.

  Equivalent canonical config paths in other providers (use whichever
  matches your platform): `.gitlab-ci.yml` (GitLab CI), `.circleci/config.yml`
  (CircleCI), `Jenkinsfile` (Jenkins), `azure-pipelines.yml` (Azure),
  `bitbucket-pipelines.yml` (Bitbucket), `buildspec.yml` (AWS
  CodeBuild), `.drone.yml` (Drone), `.woodpecker.yml` (Woodpecker),
  `cloudbuild.yaml` (GCP Cloud Build), `codemagic.yaml` (Codemagic),
  `.travis.yml` (Travis), `.buildkite/pipeline.yml` (BuildKite),
  `tekton/*.yaml`, `Earthfile`. Any of these closes the loop.

  Even a 20-line config is worth more than nothing. If you already
  use a hosted CI without an in-repo file, add a status badge to
  `README.md` so the loop is visible to agents.

  Verify with: `test -f .github/workflows/ci.yml`
