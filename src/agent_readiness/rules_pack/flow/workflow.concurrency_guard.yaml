rules_version: 2
id: workflow.concurrency_guard
provenance: agent-readiness/workflow.concurrency_guard
pillar: flow
title: Self-pushing workflow lacks `concurrency:` guard
weight: 0.7
severity: warn
explanation: |
  Agents (and humans) read "workflow exited 0" as success — but two
  scheduled runs of a self-pushing workflow without a top-level
  `concurrency:` block race each other: the second `git push` is
  rejected silently, the workflow exits 0, and one set of changes is
  lost until a human notices stale dashboards. The pattern bites
  daily-scan / weekly-rebuild / scheduled data-publishing workflows
  most often (a manual edit colliding with the cron is the second
  common trigger).

  The fix is one block per workflow. For write workflows, prefer
  `cancel-in-progress: false` so the second run waits for the first
  rather than tossing its work.
match:
  type: composite
  op: and
  summary: |
    A workflow does `git push` and no workflow has a top-level
    `concurrency:` block. The self-pushing workflow can race itself.
  clauses:
    # Clause 1 fires when at least one workflow file contains `git push`
    # (regex match → fire_when=match → produces a finding).
    - type: regex_in_files
      pattern: 'git\s+push'
      file_globs:
        - .github/workflows/*.yml
        - .github/workflows/*.yaml
      fire_when: match
    # Clause 2 fires when NO workflow file has a top-level `concurrency:`
    # key (regex no_match → fire_when=no_match → produces a finding when
    # absent everywhere). The `^` anchor narrows to top-level keys; a
    # `concurrency:` nested inside a job stanza is not enough — GitHub
    # only honours top-level concurrency for the whole workflow.
    - type: regex_in_files
      pattern: '^concurrency:'
      file_globs:
        - .github/workflows/*.yml
        - .github/workflows/*.yaml
      fire_when: no_match
fix_hint: |
  Add a `concurrency:` block at the top of any workflow that does
  `git push`. Use a stable group name (e.g. the workflow file name) so
  multiple runs of the same workflow serialise. For write workflows,
  set `cancel-in-progress: false`:

      concurrency:
        group: ${{ github.workflow }}
        cancel-in-progress: false

  Combine with `git pull --rebase` before the `git push` so the second
  run picks up the first run's commit instead of failing on a non-fast
  forward.
insight_query: github actions workflow concurrency self-push race condition
action:
  kind: insert_after
  path: .github/workflows/release.yml
  after_pattern: "^name:\\s"
  template: |2

    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: false
  preconditions:
    - exists: .github/workflows/release.yml
verify:
  command: "grep -E '^concurrency:' .github/workflows/*.yml >/dev/null"
  description: At least one workflow must declare a concurrency group.
fix_prompt: |
  Without this, two scheduled runs of a self-pushing workflow race each
  other — the second `git push` is rejected silently and one set of
  changes is lost.

  Insert a top-level `concurrency:` block at the top of every workflow
  that does `git push`. Use a stable group name and disable
  cancel-in-progress so the second run waits: `concurrency:` then
  `group: ${{ github.workflow }}-${{ github.ref }}` then
  `cancel-in-progress: false`. Combine with `git pull --rebase` before
  the `git push` so the second run picks up the first run's commit
  instead of failing on a non-fast-forward.

  Verify with: `grep -E '^concurrency:' .github/workflows/*.yml`
