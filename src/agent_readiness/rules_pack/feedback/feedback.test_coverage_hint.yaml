rules_version: 2
id: feedback.test_coverage_hint
provenance: agent-readiness/feedback.test_coverage_hint
pillar: feedback
title: Coverage configuration hint
weight: 0.5
severity: info
explanation: |
  Agents making a change need to know which lines are covered by
  tests so they can target new tests appropriately and avoid adding
  behaviour into an untested path. Coverage configuration
  (`.coveragerc`, `codecov.yml`, `coveralls.yml`,
  `pyproject.toml [tool.coverage.*]`) is the signal that the repo
  tracks this. Community-contributed demo rule.
match:
  type: composite
  op: or
  summary: Coverage tooling is configured (any ecosystem).
  clauses:
    - type: path_glob
      require_globs:
        # Cross-language reporters
        - .coveragerc
        - codecov.yml
        - .codecov.yml
        - coveralls.yml
        - .coveralls.yml
        - sonar-project.properties
        # Python
        - .coverage
        # JS/TS
        - jest.config.js
        - jest.config.ts
        - jest.config.cjs
        - jest.config.mjs
        - vitest.config.ts
        - vitest.config.js
        - karma.conf.js
        # Go / Rust / Ruby
        - .simplecov
        - .simplecov.yml
        # Java / Kotlin / Scala
        - jacoco.xml
        - .jacoco/**
    - type: regex_in_files
      pattern: '\[tool\.coverage(\.|\s|\])'
      file_globs:
        - pyproject.toml
    - type: regex_in_files
      pattern: '"coverage"\s*:'
      file_globs:
        - package.json
fix_hint: |
  Add a coverage config (`.coveragerc` for pytest-cov, `codecov.yml` for
  Codecov) so coverage signal is visible to both humans and agents.
insight_query: test coverage config codecov coveralls pytest-cov
action:
  kind: modify_manifest_field
  manifest: pyproject.toml
  field_path: tool.coverage.report.fail_under
  value: "80"
  preconditions:
    - exists: pyproject.toml
    - manifest_language: python
verify:
  command: "grep -E 'fail_under\\s*=' pyproject.toml >/dev/null"
  description: A coverage threshold must be configured.
fix_prompt: |
  Without this, an agent making a change has no signal about which lines
  are tested and may add behaviour into an untested path.

  Add a coverage configuration for your {primary_language} project. The
  exact threshold matters less than its presence — what an agent needs
  is a visible signal that coverage is tracked.

  Common choices by ecosystem:
  - Python (pytest-cov / coverage.py): append `[tool.coverage.report]`
    to `pyproject.toml` with `fail_under = 80`.
  - JS/TS (jest / vitest): set `coverageThreshold` in `jest.config.js`
    or `coverage.thresholds` in `vitest.config.ts`.
  - Go: track via `go test -coverprofile` + a `make coverage` target;
    publish with Codecov / Coveralls (`codecov.yml`).
  - Rust: tarpaulin (`.tarpaulin.toml`) or grcov in CI.
  - Ruby: simplecov (`.simplecov`).
  - Java/Kotlin: jacoco (`jacoco.xml` or build-tool plugin).
  - PHP: phpunit's `--coverage-clover`.

  As a generic option, drop a top-level `codecov.yml` with
  `coverage.status.project.target: 80%` — it works for any language
  Codecov supports.

  Verify with: `grep -E 'fail_under|coverageThreshold|coverage' pyproject.toml codecov.yml jest.config.* vitest.config.* 2>/dev/null`
