rules_version: 2
id: code.complexity
provenance: agent-readiness/code.complexity
pillar: cognitive_load
title: Code cyclomatic complexity is bounded
weight: 0.7
severity: warn
explanation: |
  High cyclomatic complexity means many independent control-flow
  paths through one function. Agents that try to modify such a
  function have to consider every path; they make more wrong-branch
  edits than humans do, who can hold more context in their heads.
  Functions over CC=15 are the strongest predictor of agent edit
  errors in a 2026 internal study.
match:
  type: ast_complexity
  max_cc: 15
  top_n: 5
  languages:
    - python
    - javascript
    - typescript
    - go
    - java
fix_hint: |
  For each over-budget function, extract independent branches into
  separate helper functions named for the branch's intent. Aim for
  CC ≤ 10 per function as a steady-state.
insight_query: cyclomatic complexity function CC AST agent error rate refactor
action:
  kind: run_command
  command: |
    # No deterministic auto-refactor exists; print a hint message and
    # rely on the engine's re-scan as the closed loop. This avoids
    # running a Python-specific tool on a non-Python repo.
    echo "code.complexity: refactor functions above CC=15; re-scan to confirm."
  description: |
    Identify high-complexity functions with your stack's audit tool
    and split them by responsibility (see fix_prompt for per-language
    choices). No autofix; the rule re-scan is the closed loop.
verify:
  command: "true"
  description: |
    No deterministic verify exists for complexity refactors; the rule
    re-scan is the closed loop. Marked offline-safe so the agent can
    proceed without networked tools.
fix_prompt: |
  Without this, an agent editing a high-CC function has to reason across
  every branch and ships more wrong-branch edits than a human would.

  Audit functions over cyclomatic complexity 15 with your stack's
  conventional tool, then for each over-budget function extract
  independent branches into helpers named for the branch's intent.
  Target CC ≤ 10 per function as steady state. Re-run the audit after
  each split.

  Per-language audit commands ({primary_language} suggested):
  - Python: `radon cc src/ -s -n B`
  - JS/TS: ESLint `complexity` rule, or `npx jscpd`
  - Go: `gocyclo -over 15 .`
  - Rust: `cargo clippy -- -W clippy::cognitive_complexity`
  - Ruby: `rubocop --only Metrics/CyclomaticComplexity`
  - Java/Kotlin: SonarQube / detekt `ComplexMethod`
  - PHP: `phpmd src/ text codesize` (cyclomatic_complexity rule)
  - Swift: SwiftLint `cyclomatic_complexity`
  - C#: SonarAnalyzer / Roslyn analyzer `S1541`

  Verify with: re-run the complexity audit and confirm no function
  exceeds the threshold.
