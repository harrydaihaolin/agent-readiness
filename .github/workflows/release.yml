name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build
        run: pip install build

      - name: Build wheel and sdist
        run: python -m build

      - name: Verify dist contents
        run: ls -lh dist/

      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  publish-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/agent-readiness
    permissions:
      id-token: write   # Required for OIDC trusted publishing

    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true   # idempotent: safe to re-run if tag is re-pushed

  github-release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write   # Required to create releases and upload assets

    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: dist/*

  publish-github-packages:
    name: Publish to GitHub Packages (Container Registry)
    needs: build
    runs-on: ubuntu-latest
    permissions:
      packages: write

    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push installable image to GHCR
        run: |
          TAG=ghcr.io/${{ github.repository }}:${{ github.ref_name }}
          LATEST=ghcr.io/${{ github.repository }}:latest
          docker build --build-arg WHEEL="$(basename dist/*.whl)" -t "$TAG" -t "$LATEST" -f - . <<'DOCKERFILE'
          FROM python:3.12-slim
          ARG WHEEL
          COPY dist/ /dist/
          RUN pip install --no-cache-dir /dist/${WHEEL} && rm -rf /dist
          ENTRYPOINT ["agent-readiness"]
          DOCKERFILE
          docker push "$TAG"
          docker push "$LATEST"
