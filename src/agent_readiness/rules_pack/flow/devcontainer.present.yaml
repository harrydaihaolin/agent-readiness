rules_version: 2
id: devcontainer.present
provenance: agent-readiness/devcontainer.present
pillar: flow
title: Dev container or reproducible workspace configured
weight: 0.8
severity: info
explanation: |
  Agents in a fresh sandbox hit "wrong runtime version" / "missing
  system library" within minutes of bring-up and can't recover
  headlessly without a reproducible environment definition. A
  devcontainer / Nix flake / Gitpod config / Vagrantfile lets the
  agent (or a new contributor) get that environment without
  hand-installing system deps and cuts the class of failure to zero.
match:
  type: composite
  op: or
  summary: At least one reproducible-workspace config is present.
  clauses:
    - type: path_glob
      require_globs:
        - .devcontainer/devcontainer.json
        - .devcontainer/**
        - .devcontainer.json
        - .gitpod.yml
        - .gitpod.Dockerfile
        - flake.nix
        - shell.nix
        - default.nix
        - .nix/**
        - devbox.json
        - mise.toml
        - .mise.toml
        - .tool-versions
        - Vagrantfile
        - .codesandbox/**
        - docker-compose.dev.yml
        - docker-compose.dev.yaml
        - compose.dev.yml
        - compose.dev.yaml
fix_hint: |
  Drop a minimal `.devcontainer/devcontainer.json` referencing a
  Microsoft base image plus `postCreateCommand: pip install -e .`.
  For Nix shops, `flake.nix` with a dev shell is the equivalent.
fix_template:
  kind: create_file
  path: .devcontainer/devcontainer.json
  content: |
    {
      "name": "default",
      "image": "mcr.microsoft.com/devcontainers/base:ubuntu",
      "postCreateCommand": "echo 'Replace with your install command (see AGENTS.md).'",
      "customizations": {
        "vscode": {
          "extensions": []
        }
      }
    }
insight_query: devcontainer Nix Gitpod reproducible environment workspace
action:
  kind: create_file
  path: .devcontainer/devcontainer.json
  template: |
    {
      "name": "{primary_language} dev",
      "image": "mcr.microsoft.com/devcontainers/{primary_language}:1",
      "postCreateCommand": "make install"
    }
  preconditions:
    - not_exists: .devcontainer/devcontainer.json
  context_probe:
    - detect: primary_language
verify:
  command: "test -f .devcontainer/devcontainer.json"
  description: .devcontainer/devcontainer.json must exist.
fix_prompt: |
  Without this, an agent in a fresh sandbox hits "wrong runtime version"
  / "missing system library" within minutes of bring-up and can't
  recover headlessly.

  Create `.devcontainer/devcontainer.json` for this {primary_language}
  project. Microsoft publishes language-specific base images at
  `mcr.microsoft.com/devcontainers/<lang>:1` for python, javascript-node,
  typescript-node, go, rust, java, dotnet, ruby, php, etc. Pick the one
  that matches {primary_language}; fall back to
  `mcr.microsoft.com/devcontainers/base:ubuntu` plus a `features:` block
  if no language-specific image fits. Set `postCreateCommand` to your
  canonical install command (mirror what's in `AGENTS.md` — for example
  `{language_install_command}`). Add the VS Code / Cursor extensions
  you actually use to `customizations.vscode.extensions`.

  For Nix shops, `flake.nix` with a `devShell` is the equivalent;
  for Gitpod, `.gitpod.yml` + `.gitpod.Dockerfile`; for tool-version
  managers, `.tool-versions` (asdf/mise) is the lightest-weight option.

  Verify with: `test -f .devcontainer/devcontainer.json`
