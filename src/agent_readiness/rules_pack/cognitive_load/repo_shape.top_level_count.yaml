rules_version: 2
id: repo_shape.top_level_count
provenance: agent-readiness/repo_shape.top_level_count
pillar: cognitive_load
title: Few non-meta files at repo root
weight: 0.8
severity: warn
explanation: |
  An agent's first impression of a repo is `ls`. A root with 30+
  non-meta files (excluding readme / license / config) signals a
  flat, undirectory'd project where finding *anything* requires
  reading every name. Mature projects keep the root short by
  pushing source into `src/`, `pkg/`, `app/`, etc.
match:
  type: tree_aggregate
  mode: top_level_count
  warn_above: 20
  exclude_dotfiles: true
  exclude_stems:
    - readme
    - license
    - licence
    - copying
    - notice
    - authors
    - contributors
    - changelog
    - history
    - news
    - codeowners
    - makefile
    - dockerfile
    - vagrantfile
    - earthfile
    - justfile
    - rakefile
    - taskfile
    - gemfile
    - rakefile
fix_hint: |
  Move source into `src/<package>/`, scripts into `scripts/`, docs
  into `docs/`. The root should contain manifest + README + license
  + maybe a Makefile, and that's it.
insight_query: repo shape top level files root flat structure src package
action:
  kind: run_command
  command: |
    # Reduce top-level directory count to ≤ 12 by grouping related
    # subtrees under a parent (e.g. apps/, packages/, services/).
    ls -1 . | wc -l
  description: |
    A flat top level confuses agents; group subtrees under parents.
verify:
  command: "true"
  description: Manual; re-scan is the closed loop.
fix_prompt: |
  Without this, an agent's first `ls` returns 30+ items and finding
  anything requires reading every filename.

  Move source files under a single subtree using your stack's
  conventional layout. Common choices:
  - Python: `src/<package>/` (PEP 517 src-layout) or `<package>/`
  - JS/TS: `src/`, plus `apps/` + `packages/` for monorepos
  - Go: `cmd/<name>/`, `pkg/`, `internal/`
  - Rust: `src/`, plus `crates/` for workspaces
  - Java/Kotlin/Scala: `src/main/<lang>/`, `src/test/<lang>/`
  - Ruby: `lib/`, `app/` (Rails)
  - PHP: `src/`, `tests/` (PSR-4 autoload)
  - Swift: `Sources/`, `Tests/`
  - Elixir: `lib/`, `test/`
  - Dart/Flutter: `lib/`, `bin/`, `test/`

  Move scripts under `scripts/`, docs under `docs/`. The root should
  hold manifest + README + LICENSE + maybe Makefile and that's it —
  typically ≤ 12 entries when you list with `ls -1 .`. Don't move
  dotfiles or license/changelog files; those are expected at root.

  Verify with: `ls -1 . | wc -l` returns ≤ 20 non-dotfile entries.
