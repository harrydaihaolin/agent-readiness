rules_version: 2
id: repo_shape.token_budget
provenance: agent-readiness/repo_shape.token_budget
pillar: cognitive_load
title: Orientation fits in agent context window
weight: 0.7
severity: warn
explanation: |
  Most agents start a session by reading some combination of
  AGENTS.md / CLAUDE.md / README + the primary manifest + a handful
  of representative source files. If that combined "orientation
  bundle" exceeds the agent's context budget, the agent either
  truncates (loses signal) or skips files (works from incomplete
  knowledge). Repos that fit comfortably under the warn threshold
  give every agent a fair start. Documentation-rich repos (e.g.
  large frameworks with comprehensive READMEs) can override
  ``warn_tokens`` per-repo via ``.agent-readiness.toml``.
match:
  type: tree_aggregate
  mode: orientation_tokens
  warn_tokens: 32000
  max_tokens: 120000
fix_hint: |
  Trim AGENTS.md / README to the essentials and split monolithic
  modules so the largest representative source file is < 500 lines.
  The orientation budget is fixed; the only variable is how much
  signal you fit into it.
insight_query: token budget orientation context window AGENTS README size
action:
  kind: run_command
  command: |
    # Trim AGENTS.md / README.md to the essentials so the orientation
    # cost fits in an agent's context window.
    wc -l AGENTS.md README.md 2>/dev/null
  description: |
    Trim AGENTS.md and README.md so total orientation cost is < 2k
    tokens; split monolithic source files so the largest is < 500 lines.
verify:
  command: "true"
  description: Manual; re-scan is the closed loop.
fix_prompt: |
  Without this, an agent's first session truncates the orientation bundle
  and works from incomplete knowledge of the project.

  Trim `AGENTS.md` and `README.md` so the combined orientation cost stays
  under 32k tokens. Move detail into linked sub-pages under `docs/`
  rather than inlining. Split monolithic source files so the largest
  representative file an agent would read on entry is under 500 lines.
  The orientation budget is fixed — the lever is signal density, not
  length.

  Verify with: `wc -l AGENTS.md README.md` and confirm the total fits
  your stack's token budget.
