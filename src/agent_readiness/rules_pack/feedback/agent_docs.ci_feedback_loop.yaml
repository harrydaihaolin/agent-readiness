rules_version: 2
id: agent_docs.ci_feedback_loop
provenance: agent-readiness/agent_docs.ci_feedback_loop
pillar: feedback
title: AGENTS.md documents CI monitoring as feedback
weight: 0.75
severity: warn
explanation: |
  Agents that push a PR without an explicit contract to watch CI
  declare "done" before checking whether the build went red — the
  feedback loop is open-circuited and the same failure mode as
  missing hooks, only slower. CI is the main automated feedback
  channel once a branch is pushed; the root `AGENTS.md` should
  explicitly bind **monitor CI / checks → read failures → fix and
  iterate** into the agent contract.
match:
  type: composite
  op: and
  summary: |
    AGENTS.md is present but does not tell agents to monitor CI runs /
    check results and act on failures as feedback.
  clauses:
    # Fire only when canonical AGENTS.md exists (let agent_docs.canonical
    # own the "missing file" case).
    - type: composite
      op: not
      summary: Skip when AGENTS.md is absent.
      clauses:
        - type: path_glob
          require_globs:
            - AGENTS.md
    - type: regex_in_files
      pattern: >-
        (?is)(?:(?:\bCI\b|GitHub Actions|workflow|\bchecks?\b).{0,400}\b(?:monitor|watch|check|track|review)\b)|(?:(?:\bmonitor\b|\bwatch\b|\bcheck\b|\btrack\b).{0,400}(?:\bCI\b|GitHub Actions|workflow|\bchecks?\b))|(?:(?:\bCI\b|workflow|checks?).{0,400}(?:fail|failure|failing|red|broken).{0,400}(?:fix|address|investigate|triage|remediate|resolve|iterat))|(?:(?:\bCI\b|workflow).{0,200}\bfeedback\s+loop\b)|(?:\bfeedback\s+loop\b.{0,200}(?:\bCI\b|workflow|checks?))
      file_globs:
        - AGENTS.md
      fire_when: no_match
fix_hint: |
  Add a short "CI and the feedback loop" section to `AGENTS.md`: after
  pushing or updating a PR, monitor workflow / PR check results; when CI
  fails, use logs as signal, fix the root cause, and iterate until green.
fix_template:
  kind: append_to_file
  path: AGENTS.md
  content: |2

    ## CI and the feedback loop

    **CI is part of the feedback loop.** After you push or update a PR, **monitor GitHub Actions / workflow runs and check results**. When **CI fails**, read the logs, **fix the root cause**, and push follow-up commits. Do not stop while checks are red or ignore failing workflows.
insight_query: AGENTS.md CI monitoring workflow failures feedback loop pull request checks
action:
  kind: create_file
  path: AGENTS.md
  template: |
    # Agents guide

    ## Feedback loop

    - Preview locally: `make ci-local` (or your project's equivalent)
    - Re-run the failing CI step from CLI:
      - GitHub Actions: `gh run rerun --failed`
      - GitLab CI: `glab ci retry`
      - CircleCI: `circleci local execute`
    - CI artifacts are uploaded to the provider's run page.
  preconditions:
    - not_exists: AGENTS.md
verify:
  command: "grep -i 'feedback\\|ci\\|test' AGENTS.md >/dev/null"
  description: AGENTS.md must reference the CI feedback loop.
fix_prompt: |
  Without this, an agent pushes a PR and declares "done" without checking
  whether CI went red — the feedback loop is open-circuited.

  Append a `## CI and the feedback loop` section to `AGENTS.md`. State
  explicitly: "After you push or update a PR, monitor your CI provider's
  run/check results (GitHub Actions, GitLab CI, CircleCI, Jenkins,
  BuildKite, or whatever your repo uses) and treat failing checks as
  signal to act on, not noise. When CI fails, read the logs, fix the
  root cause, and push follow-up commits. Do not stop while checks are
  red."

  Cite the canonical command an agent should run to inspect runs. For
  GitHub Actions: `gh run watch`. For GitLab: `glab ci status`. For
  CircleCI: `circleci local execute` (preview) or the PR's checks tab.
  For Jenkins: the build URL in the PR. Pick whichever matches the CI
  provider this repo uses.

  Verify with: `grep -i 'feedback\|ci\|workflow' AGENTS.md`
