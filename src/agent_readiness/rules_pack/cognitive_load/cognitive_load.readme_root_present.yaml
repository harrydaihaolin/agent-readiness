rules_version: 2
id: cognitive_load.readme_root_present
provenance: agent-readiness/cognitive_load.readme_root_present
pillar: cognitive_load
title: README at repository root
weight: 0.8
severity: warn
explanation: |
  Agents and contributors expect a root README.md as the primary orientation
  surface. Its absence forces guesswork from filenames and CI config alone.
match:
  type: path_glob
  require_globs:
    - README.md
    - readme.md
fix_hint: |
  Add a README.md at the repo root with install, run, and test instructions.
insight_query: README missing repository root documentation orientation
action:
  kind: create_file
  path: README.md
  template: |
    # {primary_language} project

    One-line description.

    ## Setup
    `make install`

    ## Test
    `make test`
  preconditions:
    - not_exists: README.md
  context_probe:
    - detect: primary_language
verify:
  command: "test -f README.md"
  description: README.md must exist at the repo root.
fix_prompt: |
  Without this, an agent has no orientation surface and must infer the
  project from filenames and CI alone.

  Create `README.md` at the repo root for a {primary_language} project.
  Open with a one-line description, then three sections in this order:
  **Setup** (one fenced code block with the install command), **Test**
  (one fenced block with the canonical test command), **Run** (one fenced
  block showing how to start the project). Three fenced blocks is the
  floor.

  Verify with: `test -f README.md`
