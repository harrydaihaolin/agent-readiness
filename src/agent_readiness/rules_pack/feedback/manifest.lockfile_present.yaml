rules_version: 2
id: manifest.lockfile_present
provenance: agent-readiness/manifest.lockfile_present
pillar: feedback
title: Dependency lockfile present
weight: 1.0
severity: warn
explanation: |
  A lockfile pins the exact dependency tree the project was last
  validated against. Without one, `pip install` / `npm install` will
  resolve different versions on different machines, so an agent that
  installs deps and runs tests can't trust a green run on its laptop
  to predict a green run in CI. Some ecosystems (Cargo, Poetry, npm)
  produce lockfiles automatically; others (bare requirements.txt) do
  not, and the project has to opt in.
match:
  type: composite
  op: or
  summary: At least one ecosystem-specific lockfile is committed.
  clauses:
    - type: path_glob
      require_globs:
        - poetry.lock
        - uv.lock
        - Pipfile.lock
        - pdm.lock
        - package-lock.json
        - npm-shrinkwrap.json
        - yarn.lock
        - pnpm-lock.yaml
        - Cargo.lock
        - Gemfile.lock
        - composer.lock
        - go.sum
        - mix.lock
        - flake.lock
        - conda-lock.yml
        - pixi.lock
    - type: path_glob
      require_globs:
        - requirements*.txt
        - environment.yml
        - environment.yaml
fix_hint: |
  Run `poetry lock` / `npm install` / `cargo update` (whichever your
  manifest needs) and commit the resulting lockfile. For pip-only
  Python projects, freezing `requirements.txt` to exact versions or
  switching to `uv` / `poetry` is acceptable.
insight_query: lockfile dependency pinning poetry npm cargo reproducible install
action:
  kind: run_command
  command: |
    # Dispatch on the detected package manager. Each branch runs the
    # canonical lockfile-generation command for its ecosystem. When
    # the probe doesn't resolve (`{package_manager}` empty), we fall
    # through and print a no-op message rather than running garbage
    # tokens through `sh`. apply_top_action treats stderr-with-exit-0
    # as success, so the workflow doesn't break on undetectable repos.
    pm="{package_manager}"
    case "$pm" in
      uv)        uv lock ;;
      poetry)    poetry lock ;;
      pipenv)    pipenv lock ;;
      pdm)       pdm lock ;;
      npm)       npm install --package-lock-only ;;
      pnpm)      pnpm install --lockfile-only ;;
      yarn)      yarn install --mode=update-lockfile ;;
      bun)       bun install --frozen-lockfile || bun install ;;
      cargo)     cargo generate-lockfile ;;
      bundler)   bundle lock ;;
      composer)  composer update --lock ;;
      go)        go mod tidy ;;
      *)         echo "manifest.lockfile_present: package_manager not detected; skipping (no-op)" ;;
    esac
  description: |
    Run the package manager's lock command (e.g. `uv lock`,
    `npm install --package-lock-only`, `cargo generate-lockfile`).
    Dispatches on the detected package_manager probe.
  context_probe:
    - detect: package_manager
verify:
  command: |
    test -f uv.lock || test -f poetry.lock || test -f Pipfile.lock || \
      test -f pdm.lock || test -f package-lock.json || \
      test -f npm-shrinkwrap.json || test -f yarn.lock || \
      test -f pnpm-lock.yaml || test -f bun.lock || test -f bun.lockb || \
      test -f Cargo.lock || test -f Gemfile.lock || \
      test -f composer.lock || test -f go.sum || test -f mix.lock
  description: A lockfile must exist (any supported ecosystem).
fix_prompt: |
  Without this, `pip install` / `npm install` / `bundle install`
  resolves different versions on different machines and the agent's
  green run on its laptop can't predict CI's outcome.

  Generate and commit a lockfile using your package manager
  ({package_manager}). Canonical lock commands by ecosystem:

  - uv:      `uv lock`
  - poetry:  `poetry lock`
  - pipenv:  `pipenv lock`
  - pdm:     `pdm lock`
  - npm:     `npm install --package-lock-only`
  - pnpm:    `pnpm install --lockfile-only`
  - yarn:    `yarn install --mode=update-lockfile`
  - bun:     `bun install --frozen-lockfile`
  - cargo:   `cargo generate-lockfile`
  - bundler: `bundle lock`
  - composer:`composer update --lock`
  - go:      `go mod tidy` (regenerates `go.sum`)
  - mix:     `mix deps.get` (writes `mix.lock`)

  For bare-pip Python projects with no lockfile tooling, either switch
  to `uv` or `poetry` for a real lockfile, or pin `requirements.txt`
  to exact versions with `pip freeze > requirements.txt`.

  Verify with: `test -f uv.lock || test -f poetry.lock || test -f Pipfile.lock || test -f pdm.lock || test -f package-lock.json || test -f yarn.lock || test -f pnpm-lock.yaml || test -f bun.lock || test -f bun.lockb || test -f Cargo.lock || test -f Gemfile.lock || test -f composer.lock || test -f go.sum || test -f mix.lock`
