rules_version: 2
id: feedback.test_coverage_hint
provenance: agent-readiness/feedback.test_coverage_hint
pillar: feedback
title: Coverage configuration hint
weight: 0.5
severity: info
explanation: |
  Coverage configuration (`.coveragerc`, `codecov.yml`, `coveralls.yml`,
  `pyproject.toml [tool.coverage.*]`) signals that the repo tracks which
  code is exercised by tests. Agents benefit from knowing what is and
  isn't tested before making a change, so they can target tests
  appropriately. Community-contributed demo rule.
match:
  type: path_glob
  require_globs:
    - .coveragerc
    - codecov.yml
    - .codecov.yml
    - coveralls.yml
    - .coveralls.yml
fix_hint: |
  Add a coverage config (`.coveragerc` for pytest-cov, `codecov.yml` for
  Codecov) so coverage signal is visible to both humans and agents.
insight_query: test coverage config codecov coveralls pytest-cov
action:
  kind: modify_manifest_field
  manifest: pyproject.toml
  field_path: tool.coverage.report.fail_under
  value: "80"
  preconditions:
    - exists: pyproject.toml
    - manifest_language: python
verify:
  command: "grep -E 'fail_under\\s*=' pyproject.toml >/dev/null"
  description: A coverage threshold must be configured.
fix_prompt: |
  Without this, an agent making a change has no signal about which lines
  are tested and may add behaviour into an untested path.

  Add a coverage configuration. For Python with pytest-cov, add a
  `[tool.coverage.report]` table to `pyproject.toml` with `fail_under =
  80`. For JS, add `codecov.yml` with `coverage.status.project.target:
  80%`. The exact threshold matters less than its presence — what an
  agent needs is a visible signal that coverage is tracked.

  Verify with: `grep -E 'fail_under|coverage' pyproject.toml codecov.yml
  2>/dev/null`
