rules_version: 2
id: gitignore.covers_junk
provenance: agent-readiness/gitignore.covers_junk
pillar: safety
title: .gitignore covers build artifacts and secrets
weight: 1.0
severity: warn
explanation: |
  An agent that runs the project's build, test, or install step
  produces artefact directories for its ecosystem — `target/` on
  JVM / Rust, `__pycache__/` + `dist/` on Python, `node_modules/`
  on Node, `vendor/` on Go, `_build/` on Elixir, etc. If `.gitignore`
  doesn't cover the artefacts for the *detected* primary language,
  those directories get accidentally committed and pollute every
  future diff. The same pattern catches secrets and IDE state:
  `.env` not being ignored is how API keys end up in public history,
  and stray `.idea/` / `.vscode/` directories show up in PRs nobody
  intended. The rule scores against the per-language groups for the
  detected stack plus three universal groups (`dotenv`, `ide_junk`,
  `logs`) that matter for every repo.
match:
  type: gitignore_coverage
  # language_aware: the matcher resolves the repo's primary language
  # from the same probe the action templates use and requires only the
  # *universal* groups (dotenv / ide_junk / logs) plus the per-language
  # groups for each detected language. A Scala-only repo no longer
  # fires for missing `node_modules/` or `__pycache__/`; a Python+Node
  # monorepo still requires both. Unclassifiable repos fall back to
  # the full-list behaviour. min_groups_covered is implicit in this
  # mode — every required (universal + language) group must be present.
  language_aware: true
  groups:
    - python_pycache
    - node_modules
    - dotenv
    - dist_build
    - go_vendor
    - rust_target
    - jvm_class
    - ide_junk
    - python_egg_info
    - coverage
    - terraform
    - logs
    - swift_build
fix_hint: |
  Generate a `.gitignore` for your stack (e.g. https://gitignore.io)
  and paste the result. At minimum, every repo needs the universal
  groups (`.env`, IDE state, `*.log`); the rest are scored against
  the detected primary language only.
fix_template:
  # ``append_to_file`` so the patch works whether the repo already has
  # a `.gitignore` (we add the missing groups) or has none (it gets
  # created). The appended block intentionally ships the union of
  # common ecosystems — the matcher only scores against the detected
  # language's groups, so over-ignoring is harmless.
  kind: append_to_file
  path: .gitignore
  content: |
    # --- agent-readiness: cover artefacts + secrets ---
    # Secrets / env (universal — every repo)
    .env
    .env.*
    !.env.example

    # IDE / OS junk (universal — every repo)
    .idea/
    .vscode/
    .DS_Store

    # Logs (universal — every repo)
    *.log

    # Python
    __pycache__/
    *.py[cod]
    *.egg-info/
    .venv/
    venv/
    .pytest_cache/
    htmlcov/

    # JS / Node
    node_modules/

    # JVM (Java / Kotlin / Scala) / Rust
    target/
    *.class
    .metals/
    .bloop/

    # Build outputs (Python / JS / C++)
    dist/
    build/

    # Go
    vendor/

    # Swift / Xcode
    .build/
    DerivedData/
insight_query: .gitignore build artifacts secrets node_modules pycache .env coverage
action:
  kind: edit_gitignore
  entries:
    - .env
    - .env.*
    - "!.env.example"
    - .venv/
    - venv/
    - node_modules/
    - dist/
    - build/
    - "*.log"
    - .DS_Store
    - "*.pyc"
    - __pycache__/
verify:
  command: |
    grep -E '^(\.env|\.idea|\*\.log)' .gitignore >/dev/null
  description: |
    .gitignore must cover the universal groups (dotenv / IDE junk /
    logs). The full language-aware check is enforced by the matcher
    against the detected primary language; this verify command only
    asserts the always-required floor.
fix_prompt: |
  Without this, an agent that runs the project's build or install
  step accidentally commits artefact directories and pollutes every
  future diff — and worse, `.env` files can leak secrets into
  history.

  Three groups are required for *every* repo regardless of language:

  - **Secrets**: `.env`, `.env.*`, and `!.env.example` (the negation
    keeps the placeholder tracked while ignoring real `.env` files).
  - **IDE / OS junk**: `.idea/`, `.vscode/`, `.DS_Store`, `*.swp`.
  - **Logs**: `*.log`.

  Then add the build-artefact groups that match {primary_language}
  (the matcher only scores you on these for the language it detected,
  so other ecosystems' patterns are optional padding):

  - **Python**: `__pycache__/`, `*.py[cod]`, `*.egg-info/`,
    `.venv/`, `venv/`, `.pytest_cache/`, `htmlcov/`, `dist/`,
    `build/`.
  - **JS / TS**: `node_modules/`, `dist/`, `coverage/`.
  - **Go**: `vendor/`.
  - **Rust**: `target/`.
  - **JVM (Java / Kotlin / Scala / Clojure)**: `target/`, `*.class`,
    `.metals/`, `.bloop/` (Scala-specific build-state dirs).
  - **Swift**: `.build/`, `DerivedData/`.

  Verify with: `grep -E '^(\.env|\.idea|\*\.log)' .gitignore`
  (universal-group check; the language-specific check is
  ecosystem-dependent).
