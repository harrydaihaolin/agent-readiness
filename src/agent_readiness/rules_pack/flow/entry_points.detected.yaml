rules_version: 2
id: entry_points.detected
provenance: agent-readiness/entry_points.detected
pillar: flow
title: Entry point detected
weight: 1.0
severity: warn
explanation: |
  An agent looking to run the project needs an obvious entry point. A
  manifest-declared script (`[project.scripts]` in pyproject.toml,
  `bin` / `main` in package.json) is the strongest signal, but
  conventional filenames (`main.py`, `cmd/<name>/main.go`,
  `__main__.py`, `index.{js,ts}`) also count. Without any of these,
  the agent has to guess from filenames, which fails for non-trivial
  layouts.
applies_when:
  # Code-ecosystem rule: skip on YAML-only / docs-only / config-only
  # repos where ctx.detected_languages is empty. There's nothing for
  # an "entry point" to refer to without source code. Requires
  # agent-readiness >= 2.8.0.
  any_language_detected: true
match:
  type: composite
  op: or
  summary: At least one entry-point convention is present.
  clauses:
    - type: manifest_field
      manifest: pyproject.toml
      field_path: project.scripts
      fire_when: missing
    - type: manifest_field
      manifest: package.json
      field_path: bin
      fire_when: missing
    - type: manifest_field
      manifest: package.json
      field_path: main
      fire_when: missing
    - type: path_glob
      require_globs:
        # Python
        - main.py
        - src/main.py
        - "src/*/main.py"
        - "src/*/__main__.py"
        - "src/*/cli.py"
        - app/main.py
        - app.py
        - cli.py
        - "**/__main__.py"
        # Go
        - cmd/**/main.go
        - main.go
        # Rust
        - main.rs
        - "src/main.rs"
        # Node / JS / TS
        - index.js
        - index.ts
        - index.mjs
        - index.cjs
        - src/index.js
        - src/index.ts
        - server.js
        - server.ts
        # Ruby (Sinatra / Rack / Rails entry)
        - config.ru
        - bin/console
        # PHP
        - index.php
        - public/index.php
        - bin/console
        # Java / Kotlin / Scala (main class implied by build files;
        # also look for conventional Application.{java,kt,scala})
        - "src/main/java/**/Application.java"
        - "src/main/kotlin/**/Application.kt"
        - "src/main/scala/**/Application.scala"
        # Swift
        - main.swift
        - Sources/**/main.swift
        # Elixir (mix release entry)
        - lib/application.ex
        - "lib/*/application.ex"
        # Dart / Flutter
        - bin/main.dart
        - lib/main.dart
        # Generic shell / agent conventions
        - "bin/*"
        - "cmd/*"
fix_hint: |
  Add a `[project.scripts]` table to pyproject.toml mapping a CLI
  name to your `module.cli:main` entry point. For Go, add
  `cmd/<name>/main.go`. For Node, set `"bin"` or `"main"` in
  package.json. The goal: an agent running `--help` on the package
  should find a command that works.
insight_query: entry point manifest scripts main bin __main__ cmd cli
action:
  kind: modify_manifest_field
  manifest: pyproject.toml
  field_path: project.scripts
  value: |
    main = "package.cli:main"
  preconditions:
    - exists: pyproject.toml
    - manifest_language: python
verify:
  command: "grep -lE '(project\\.scripts|\"bin\"|\"main\"|main\\.go|main\\.rs|main\\.swift|main\\.dart|public/index\\.php|config\\.ru)' pyproject.toml package.json Cargo.toml Package.swift pubspec.yaml 2>/dev/null || ls cmd/ bin/ src/main.rs main.go main.swift 2>/dev/null"
  description: An entry point must be declared or present on a conventional path.
fix_prompt: |
  Without this, an agent that wants to run the project has to guess from
  filenames and fails on non-trivial layouts.

  Declare an entry point in your manifest, or drop a file at the
  language-conventional path, whichever is idiomatic for
  {primary_language}. Common patterns:

  - **Python**: add a `[project.scripts]` table to `pyproject.toml`
    mapping a CLI name to `package.cli:main`.
  - **Node/JS/TS**: set `"bin"` or `"main"` in `package.json`.
  - **Go**: create `cmd/<name>/main.go` (conventional layout).
  - **Rust**: add `src/main.rs` (or a `[[bin]]` table in `Cargo.toml`
    for multi-binary crates).
  - **Ruby**: drop `config.ru` for Rack apps, or `bin/<name>` with
    `#!/usr/bin/env ruby` shebang.
  - **PHP**: `public/index.php` (web), or `bin/<name>` script.
  - **Java / Kotlin / Scala**: add an `Application.{java,kt,scala}`
    under `src/main/<lang>/` declaring `main` / `@SpringBootApplication`,
    and wire it as the build's start task.
  - **Swift**: add `Sources/<target>/main.swift` and declare an
    `executableTarget` in `Package.swift`.
  - **Elixir**: define `lib/<app>/application.ex` and set `mod:` in
    `mix.exs`.
  - **Dart/Flutter**: `bin/main.dart` (CLI) or `lib/main.dart` (Flutter).

  After declaring it, an agent running `--help` on the package
  should find a command that works.

  Verify with: `grep -lE '(project\\.scripts|"bin"|"main"|main\\.go|main\\.rs|main\\.swift|main\\.dart|public/index\\.php|config\\.ru)' pyproject.toml package.json Cargo.toml Package.swift pubspec.yaml 2>/dev/null || ls cmd/ bin/ src/main.rs main.go main.swift 2>/dev/null`
