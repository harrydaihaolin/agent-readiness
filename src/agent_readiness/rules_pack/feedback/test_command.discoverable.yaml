rules_version: 2
id: test_command.discoverable
provenance: agent-readiness/test_command.discoverable
pillar: feedback
title: Test command is statically discoverable
weight: 2.0
severity: warn
explanation: |
  Agents need a single canonical test command they can invoke
  headlessly. The strongest signal is a `test:` Makefile target;
  next-strongest is `[tool.pytest.ini_options]` / `scripts.test` in
  `package.json` / `tox.ini` / `pytest.ini` / language-conventional
  test files (`*_test.go`, `Cargo.toml [[test]]`, `tests/`). Without
  any of these the agent has to guess from shell history, often
  picking the wrong invocation.
match:
  type: composite
  op: or
  summary: At least one canonical test invocation is statically discoverable.
  clauses:
    - type: command_in_makefile
      target: test
      fire_when: missing
    - type: command_in_makefile
      target: tests
      fire_when: missing
    - type: regex_in_files
      pattern: '\[tool\.pytest|\[tool\.hatch\.envs|\[tool\.tox\]'
      file_globs:
        - pyproject.toml
    - type: regex_in_files
      pattern: '"test"\s*:'
      file_globs:
        - package.json
    - type: path_glob
      require_globs:
        # Python test entry points
        - pytest.ini
        - tox.ini
        - noxfile.py
        - conftest.py
        # Generic test directory conventions (most languages)
        - tests/**
        - test/**
        - __tests__/**
        - spec/**
        - "**/*_test.go"
        - "**/*_test.rs"
        - "**/test_*.py"
        # Static manifests whose presence implies a test runner is wired
        - Cargo.toml
        - go.mod
        - mix.exs
        - Gemfile
        - Package.swift
        # JS/TS test runners
        - jest.config.js
        - jest.config.ts
        - vitest.config.js
        - vitest.config.ts
        - karma.conf.js
        - playwright.config.js
        - playwright.config.ts
        # Java/Kotlin/Scala
        - build.gradle
        - build.gradle.kts
        - pom.xml
        # PHP
        - phpunit.xml
        - phpunit.xml.dist
        - pest.xml
fix_hint: |
  Add a `test:` target to your Makefile that runs your test suite
  non-interactively. Example: `test:\n\tpython -m pytest tests/`.
  This is the universal headless contract; everything else is a
  fallback.
fix_template:
  # ``append_to_file`` (not ``create_file``) so the patch applies whether
  # the project already has a Makefile (just appends a `test:` target) or
  # has none at all (the appender creates the file). The composite-or
  # match can fire even when a Makefile exists but lacks a test target,
  # so a ``create_file`` patch would clobber existing content.
  kind: append_to_file
  path: Makefile
  content: |
    .PHONY: test

    test:
    	python -m pytest tests/
insight_query: test command discoverable makefile pyproject scripts pytest tox
action:
  kind: append_to_file
  path: Makefile
  template: |2

    .PHONY: test
    test:
    	{language_test_command}
  preconditions:
    - not_exists: Makefile
  context_probe:
    - detect: primary_language
verify:
  command: "make -n test"
  description: |
    `make -n test` must resolve to a runnable command (dry-run; does
    not actually execute the tests).
fix_prompt: |
  Without this, an agent has to guess the test invocation from shell
  history and often picks the wrong one.

  Append a `test:` target to your `Makefile` for this {primary_language}
  project. The body should be `{language_test_command}` so it works
  headlessly without any TTY or prompt. Make is the universal headless
  contract.

  If you'd rather use your language's native runner, the equivalent
  signals are:
  - Python: `[tool.pytest.ini_options]` in `pyproject.toml` (or
    `pytest.ini` / `tox.ini` / `noxfile.py`)
  - JS/TS: `"test"` in `package.json` `scripts`; or `jest.config.*` /
    `vitest.config.*` / `playwright.config.*`
  - Go: any `*_test.go` next to the code; `go test ./...` always works
  - Rust: any `[[test]]` in `Cargo.toml` or `tests/*.rs`
  - Ruby: `spec/` directory + `Gemfile` (rspec convention)
  - PHP: `phpunit.xml` or `pest.xml`
  - Java/Kotlin: `build.gradle[.kts]` or `pom.xml` with `test` task
  - Swift: `swift test` on `Package.swift`
  - Elixir: `mix test` on `mix.exs`

  Any one of these is enough. Make is the universal headless
  contract; the rest are fallbacks.

  Verify with: `make -n test`
