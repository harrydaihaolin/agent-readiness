rules_version: 2
id: readme.has_run_instructions
provenance: agent-readiness/readme.has_run_instructions
pillar: cognitive_load
title: README documents install / run / test
weight: 1.0
severity: warn
explanation: |
  The README is the agent's first stop. If it has prose but no
  `install` / `run` / `test` signals — paragraphs without fenced code
  blocks, or no mention of those steps at all — the agent has to
  reverse-engineer the workflow from manifests and CI configs. Each
  of the three signals (install / run / test) is independently
  scored; the rule fires when any are missing.
match:
  type: prompt_scan
  mode: readme_run_instructions
  signals:
    - install
    - run
    - test
  require_fenced_code: true
fix_hint: |
  Add three short sections to README: Install (one fenced block),
  Run (one fenced block showing the canonical entry point), Test
  (one fenced block). Three fenced blocks is the floor; if your
  project genuinely needs more, write more.
insight_query: README install run test fenced code instructions agent orientation
action:
  kind: append_to_file
  path: README.md
  template: |2

    ## Install

    ```
    {language_install_command}
    ```

    ## Test

    ```
    {language_test_command}
    ```

    ## Run

    ```
    # Replace with this project's canonical entry-point command
    # (see AGENTS.md). For language defaults, see entry_points.detected.
    ```
  context_probe:
    - detect: package_manager
    - detect: primary_language
  preconditions:
    - exists: README.md
verify:
  command: "grep -qE '(make|npm|pnpm|yarn|bun|pip|uv|poetry|cargo|go|bundle|composer|mix|gradle|swift|dart|flutter) ' README.md"
  description: README.md must contain at least one runnable command (any ecosystem).
fix_prompt: |
  Without this, an agent reading the README finds prose but no copy-able
  commands and falls back to guessing from manifests.

  Append three short sections to `README.md`: **Install**, **Test**, and
  **Run**. Each section must contain exactly one fenced code block with
  the canonical command for your {primary_language} project. Three
  fenced blocks is the floor; add more only if the project genuinely
  needs them.

  Suggested commands (matched to your detected ecosystem):
  - Install: `{language_install_command}`
  - Test:    `{language_test_command}`
  - Run:     project-specific; see your manifest's scripts/entry-points
             (e.g. `[project.scripts]` in pyproject, `"scripts"` in
             package.json, `cargo run`, `go run ./cmd/...`).

  Verify with: `grep -qE '(make|npm|pnpm|yarn|bun|pip|uv|poetry|cargo|go|bundle|composer|mix|gradle|swift|dart|flutter) ' README.md`
