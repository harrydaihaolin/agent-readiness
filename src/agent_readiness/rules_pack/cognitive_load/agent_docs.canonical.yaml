rules_version: 2
id: agent_docs.canonical
provenance: agent-readiness/agent_docs.canonical
pillar: cognitive_load
title: Canonical AGENTS.md present
weight: 1.0
severity: warn
explanation: |
  Agents landing in a repo need a single, predictable file to read for
  canonical commands, do-not-touch lists, and commit conventions —
  AGENTS.md at the repo root is the emerging canonical contract
  between human authors and coding agents. Other formats
  (.cursorrules, CLAUDE.md, .ai/) help, but a single, well-named file
  at the root is the most predictable surface for any agent. This
  rule fires `warn` only when the canonical AGENTS.md is missing;
  partial coverage by sibling formats is rewarded by the softer
  `agent_docs.present` rule.
match:
  type: path_glob
  require_globs:
    - AGENTS.md
fix_hint: |
  Add an AGENTS.md to the repo root with: canonical commands
  (install/test/lint/run), a do-not-touch list, and commit conventions.
  See agent-readiness/AGENTS.md for an example.
fix_template:
  kind: create_file
  path: AGENTS.md
  content: |
    # Agent guide

    Conventions for AI coding agents working in this repository.

    ## Canonical commands

    - Install dev deps: `<replace with your install command>`
    - Run tests:        `<replace with your test command>`
    - Lint:             `<replace with your lint command>`

    ## Do-not-touch

    - Generated/vendored directories (list them).
    - Lockfiles unless the change is intentional.

    ## Style

    - Keep diffs scoped to one logical change.
    - Don't skip pre-commit hooks (`--no-verify`); fix the underlying issue.

    ## Headless contract

    The canonical commands above must run non-interactively — no TTY,
    no prompts. If a step needs human input, gate it behind a flag.

    ## CI and the feedback loop

    **CI is part of the feedback loop.** After you push or update a PR, **monitor GitHub Actions / workflow runs and check results**. When **CI fails**, read the logs, **fix the root cause**, and push follow-up commits. Do not stop while checks are red or ignore failing workflows.
insight_query: AGENTS.md canonical contract agent docs convention
action:
  kind: create_file
  path: AGENTS.md
  template: |
    # Agent guide

    This is a {primary_language} project. Use the commands in the
    Quick start block below; an agent will trust these over manifest
    sniffing.

    ## Quick start

    ```bash
    # Install dependencies
    {language_install_command}

    # Run tests
    {language_test_command}

    # Lint
    {language_lint_command}
    ```

    If any of the above is wrong for this project (custom runner,
    monorepo layout, etc.), edit it now.

    ## Do-not-touch

    - <!-- list paths agents should never modify, e.g. generated/, vendor/ -->

    ## Conventions

    - Branch naming: `feat/<short>`, `fix/<issue>`, `chore/<topic>`.
    - Commit style: Conventional Commits.
    - PR scope: one logical change per PR.

    ## CI and the feedback loop

    **CI is part of the feedback loop.** After you push or update a
    PR, monitor your CI provider's run results. When CI fails, read
    the logs, fix the root cause, and push follow-up commits. Do not
    stop while checks are red.
  preconditions:
    - not_exists: AGENTS.md
  context_probe:
    - detect: primary_language
    - detect: primary_manifest
    - detect: package_manager
verify:
  command: "test -f AGENTS.md"
  description: AGENTS.md must exist at the repo root.
fix_prompt: |
  Without this, an agent landing in the repo has no canonical command list
  and will guess install/test/lint by reading shell history.

  Create `AGENTS.md` at the repo root for a {primary_language} project.
  Include, in order: (1) one sentence on what this repo does, (2) the
  single install command, (3) the single test command, (4) the single
  lint command, (5) the entry-point file path. Keep it under 60 lines so
  it fits any agent's context window. Mirror the canonical commands into
  the Makefile so they're executable, not just documented.

  Verify with: `test -f AGENTS.md`
